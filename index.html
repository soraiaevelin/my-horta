<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Minha Horta 🌱</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f2f8f2;
padding-bottom:50px;
}

header{
background:#4CAF50;
color:white;
padding:20px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

h2{
margin-bottom:15px;
color:#2e7d32;
}

input,
select{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#43a047;
}

.planta{
background:white;
padding:20px;
border-radius:15px;
margin-top:15px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.info{
margin-top:8px;
}

.barra{
width:100%;
height:12px;
background:#ddd;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.progresso{
height:100%;
background:#4CAF50;
}

.status{
margin-top:10px;
font-weight:bold;
}

.verde{
color:#2e7d32;
}

.laranja{
color:#ef6c00;
}

.vermelho{
color:#c62828;
}

.total{
font-size:18px;
font-weight:bold;
text-align:center;
color:#2e7d32;
}

footer{
text-align:center;
margin-top:30px;
color:#666;
}

</style>
</head>
<body>

<header>
<h1>🌱 Minha Horta</h1>
<p>Acompanhe suas plantas até a colheita</p>
</header>

<div class="container">

<div class="card">
<h2>➕ Adicionar Planta</h2>

<input
type="text"
id="nome"
placeholder="Nome da planta">

<select id="planta">
<option value="60">🥬 Alface - 60 dias</option>
<option value="90">🥕 Cenoura - 90 dias</option>
<option value="90">🫜 Beterraba - 90 dias</option>
<option value="70">🥬 Couve - 70 dias</option>
<option value="90">🍅 Tomate - 90 dias</option>
<option value="70">🥒 Pepino - 70 dias</option>
<option value="80">🌿 Cebolinha - 80 dias</option>
<option value="60">🌿 Coentro - 60 dias</option>
<option value="75">🌿 Manjericão - 75 dias</option>
<option value="90">🍓 Morango - 90 dias</option>
<option value="100">🍉 Melancia - 100 dias</option>
</select>

<input
type="date"
id="dataPlantio">

<button onclick="adicionarPlanta()">
Salvar Planta
</button>

</div>

<div class="card">
<div class="total" id="total">
🌱 0 plantas cadastradas
</div>
</div>

<div id="lista"></div>

<footer>
Minha Horta © 2026
</footer>

</div>

<script>

let plantas = JSON.parse(
localStorage.getItem("minhaHorta")
) || [];

renderizar();

function adicionarPlanta(){

const nome =
document.getElementById("nome").value;

const dias =
parseInt(
document.getElementById("planta").value
);

const dataPlantio =
document.getElementById("dataPlantio").value;

if(nome === "" || dataPlantio === ""){
alert("Preencha todos os campos.");
return;
}

plantas.push({
nome,
dias,
dataPlantio
});

salvar();

document.getElementById("nome").value="";
document.getElementById("dataPlantio").value="";
}

function salvar(){

localStorage.setItem(
"minhaHorta",
JSON.stringify(plantas)
);

renderizar();

}

function excluir(index){

if(confirm("Excluir esta planta?")){

plantas.splice(index,1);

salvar();

}

}

function renderizar(){

const lista =
document.getElementById("lista");

lista.innerHTML = "";

document.getElementById("total")
.innerHTML =
`🌱 ${plantas.length} plantas cadastradas`;

plantas.forEach((planta,index)=>{

const hoje = new Date();

const inicio =
new Date(planta.dataPlantio);

const diasPassados =
Math.floor(
(hoje - inicio)
/ (1000*60*60*24)
);

const progresso =
Math.min(
(diasPassados/planta.dias)*100,
100
);

const restante =
Math.max(
planta.dias-diasPassados,
0
);

const colheita =
new Date(inicio);

colheita.setDate(
colheita.getDate()+planta.dias
);

let status = "";

if(progresso < 40){

status =
'<span class="vermelho">🌱 Início do crescimento</span>';

}else if(progresso < 90){

status =
'<span class="laranja">🌿 Crescendo</span>';

}else if(progresso < 100){

status =
'<span class="verde">🥕 Quase pronta</span>';

}else{

status =
'<span class="verde">🎉 Pronta para colher</span>';

}

lista.innerHTML += `

<div class="planta">

<h3>${planta.nome}</h3>

<div class="info">
📅 Plantio:
${new Date(planta.dataPlantio)
.toLocaleDateString('pt-BR')}
</div>

<div class="info">
⏳ Dias passados:
${diasPassados}
</div>

<div class="info">
🥕 Dias restantes:
${restante}
</div>

<div class="info">
🌾 Colheita:
${colheita.toLocaleDateString('pt-BR')}
</div>

<div class="status">
${status}
</div>

<div class="barra">
<div
class="progresso"
style="width:${progresso}%">
</div>
</div>

<button onclick="excluir(${index})">
🗑️ Excluir
</button>

</div>

`;

});

}

</script>

</body>
</html>
